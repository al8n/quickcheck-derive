name: CI

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'LICENSE-*'
      - '**.md'
      - '**.txt'
  pull_request:
    paths-ignore:
      - 'LICENSE-*'
      - '**.md'
      - '**.txt'
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -Dwarnings
  RUST_BACKTRACE: 1

jobs:
  rustfmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install Rust
        run: rustup toolchain install 1.95.0 --profile minimal --component rustfmt && rustup default 1.95.0
      - name: Check formatting
        run: cargo fmt --all -- --check

  clippy:
    name: clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install Rust
        # Pinned to a specific stable so trybuild `.stderr` diagnostics are
        # reproducible across local and CI; bump in lockstep with regenerated
        # UI expectations.
        run: rustup toolchain install 1.95.0 --profile minimal --component clippy && rustup default 1.95.0
      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install Rust
        run: rustup toolchain install 1.95.0 --profile minimal && rustup default 1.95.0
      - name: Build
        run: cargo build --all-targets
      - name: Test (std, default)
        run: cargo test
      - name: Test (alloc path)
        # Exercises the `alloc` Box default (the `extern crate alloc` alias);
        # the generated `alloc::boxed::Box` is the same type as std's here.
        run: cargo test --no-default-features --features alloc
