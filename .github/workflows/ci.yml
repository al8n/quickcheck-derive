name: CI

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'LICENSE-*'
      - '**.md'
      - '**.txt'
  pull_request:
    paths-ignore:
      - 'LICENSE-*'
      - '**.md'
      - '**.txt'
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -Dwarnings
  RUST_BACKTRACE: 1

jobs:
  # Formatting is platform-independent — one OS is enough.
  rustfmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install Rust
        run: rustup update stable && rustup default stable && rustup component add rustfmt
      - name: Check formatting
        run: cargo fmt --all -- --check

  clippy:
    name: clippy
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - name: Install Rust
        run: rustup update stable --no-self-update && rustup default stable && rustup component add clippy
      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

  test:
    name: test
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - name: Install Rust
        run: rustup update stable --no-self-update && rustup default stable
      - name: Build
        run: cargo build --all-targets
      - name: Test (std, default)
        run: cargo test
      - name: Test (alloc path)
        # Exercises the `alloc` Box default (the `extern crate alloc` alias);
        # the generated `alloc::boxed::Box` is the same type as std's here.
        run: cargo test --no-default-features --features alloc
